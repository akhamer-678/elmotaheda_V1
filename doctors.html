<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مواعيد الاطباء</title>
    <meta
      name="description"
      content="المتحده الطبيه التخصصيه مركز طبي متكامل في السويس يقدم خدمات الكشف الطبي والأشعة والتحاليل الطبية مع أفضل الأطباء وإمكانية حجز المواعيد أونلاين بسهولة."
    />
    <meta
      name="keywords"
      content="حجز دكتور , عيادات المتحده , مواعيد عيادات, حجز المتحده اونلاين, اطباء السويس"
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="المتحده الطبيه التخصصيه" />
    <meta name="theme-color" content="#1fa79a" />
    <link rel="stylesheet" href="css/normalize.css" />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/all.min.css" />

    <link rel="icon" href="img/favicon/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="img/favicon/favicon-32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="img/favicon/favicon-192.png"
    />
    <!-- google fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="apple-touch-icon" href="img/favicon/favicon-180.png" />
    <link rel="stylesheet" href="css/loader.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/doctors.css" />
  </head>
  <body>
    <div id="preloader" class="active">
      <div class="loader-wrapper">
        <div class="loader">
          <div class="square teal"></div>
          <div class="square yellow"></div>
          <div class="square dark"></div>
        </div>

        <div class="clinic-name">
          <span class="arabic-name"> المتحده الطبيه التخصصيه </span>

          <span class="english-name"> United Medical Specialist </span>
        </div>
      </div>
    </div>
    <!-- Header -->
    <div class="header">
      <div class="container">
        <button class="logout-btn" onclick="logout()">
          خروج
          <i class="fa-solid fa-power-off"></i>
        </button>
        <h2>الأدارة</h2>
        <img src="img/logo.jpg" alt="" />
      </div>
    </div>
    <button class="btn" onclick="openModal()">+ Add Schedule</button>

    <!-- Table -->
    <table>
      <thead>
        <tr>
          <th>Doctor</th>
          <th>Day</th>
          <th>Time</th>
          <th>Max Patients</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>Dr Ahmed</td>
          <td>Monday</td>
          <td>10:00 AM</td>
          <td>50</td>
          <td>
            <button class="edit">Edit</button>
            <button class="delete">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- MODAL -->
    <div class="modal" id="modal">
      <div class="modal-content">
        <h3>Add / Edit Schedule</h3>

        <label>Doctor</label>
        <select>
          <option>Dr Ahmed</option>
          <option>Dr Sara</option>
        </select>

        <label>Day</label>
        <select>
          <option>Monday</option>
          <option>Tuesday</option>
          <option>Wednesday</option>
        </select>

        <label>Time</label>
        <input type="time" />

        <label>Max Patients</label>
        <input type="number" value="50" />

        <div class="actions">
          <button class="btn save">Save</button>
          <button class="btn cancel" onclick="closeModal()">Cancel</button>
        </div>
      </div>
    </div>
    <script src="js/loader.js"></script>
    <script src="js/doctors.js"></script>
  </body>
</html>
