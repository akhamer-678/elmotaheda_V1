<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="page">

  <!-- Animated Background Shapes -->
  <div class="bg">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Left Branding -->
    <div class="brand">
      <h1>المتحدة الطبية</h1>
      <p>نظام إدارة العيادات الذكي</p>
    </div>

    <!-- Login Form -->
    <div class="form-box">
      <h2>تسجيل الدخول</h2>

      <form>
        <div class="field">
          <input type="text" required>
          <label>اسم المستخدم</label>
        </div>

        <div class="field">
          <input type="password" required>
          <label>كلمة المرور</label>
        </div>

        <button>دخول</button>
      </form>
    </div>

  </div>

</div>

</body>
</html>
