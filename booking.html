<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>حجز موعد</title>
    <meta
      name="description"
      content="المتحده الطبيه التخصصيه مركز طبي متكامل في السويس يقدم خدمات الكشف الطبي والأشعة والتحاليل الطبية مع أفضل الأطباء وإمكانية حجز المواعيد أونلاين بسهولة."
    />
    <meta
      name="keywords"
      content="حجز دكتور , عيادات المتحده , مواعيد عيادات, حجز المتحده اونلاين, اطباء السويس"
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="المتحده الطبيه التخصصيه" />
    <meta name="theme-color" content="#1fa79a" />
    <link rel="stylesheet" href="css/normalize.css" />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/all.min.css" />

    <link rel="icon" href="img/favicon/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="img/favicon/favicon-32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="img/favicon/favicon-192.png"
    />
    <!-- google fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="apple-touch-icon" href="img/favicon/favicon-180.png" />
    <link rel="stylesheet" href="css/loader.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/booking.css" />
  </head>
  <body>
    <!-- تحميل الصفحات  اللوجو-->
    <!-- يتم تكراره في كل صفحات الموقع -->
    <div id="preloader" class="active">
      <div class="loader-wrapper">
        <div class="loader">
          <div class="square teal"></div>
          <div class="square yellow"></div>
          <div class="square dark"></div>
        </div>

        <div class="clinic-name">
          <span class="arabic-name"> المتحده الطبيه التخصصيه </span>

          <span class="english-name"> United Medical Specialist </span>
        </div>
      </div>
    </div>
    <!-- محتوى صفحه الحجز  -->
    <div class="booking">
      <div class="container">
        <div class="back-btn">
          <a href="index.html">
            <i class="fa-solid fa-arrow-right"></i>
            العودة للتخصصات
          </a>
        </div>
        <!-- toast -->
        <div id="toast" class="toast"></div>
        <!-- كارد الدكتور -->
        <div class="doctor-card">
          <h2 id="doctor-name"></h2>
          <p id="doctor-title"></p>
          <p id="doctor-specialty"></p>
        </div>

        <!-- فورم الحجز -->
         <div id="message"></div>
        <form class="booking-form" id="booking-Form">
          <!-- المواعيد المتاحة -->
          <label>المواعيد المتاحة:</label>
          <div class="available-times" id="available-times">
            <!-- <button type="button">الثلاثاء 10:00 مساءا</button>
            <button type="button">الخميس 11:00 صباحًا</button>
            <button type="button">الخميس 11:00 صباحًا</button>
            <button type="button">الخميس 11:00 صباحًا</button> -->
            <!-- <button type="button">12:00 ظهرًا</button>  -->
            <!-- <button type="button">01:00 ظهرًا</button>  -->
          </div>

          <!-- اسم المريض -->
          <label for="patient-name">اسم المريض:</label>
          <input type="text" id="patient-name" name="patient-name" required />

          <!-- رقم الموبايل -->
          <label for="phone">رقم الموبايل:</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            required
            placeholder="01** *** ****"
            pattern="^01[0-9]{9}$" 
          />

          <!-- نوع الدفع -->
          <select id="payment" name="payment" required>
            <option value="" disabled selected hidden>اختر طريقة الدفع</option>

            <option value="cash">نقدي</option>

            <optgroup label="تعاقد">
              <option value="contract1">النصر للبترول</option>
              <option value="contract2">السويس للبترول</option>
              <option value="contract3">بنك التعمير</option>
            </optgroup>
          </select>
          <!-- زر التأكيد -->
          <button type="submit" class="submit-btn">تأكيد الحجز</button>
        </form>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <script src="js/loader.js"></script>
    <script src="js/booking.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
