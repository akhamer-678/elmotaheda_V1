<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/login_3.css">
</head>

<body>

<!-- 🔷 Brand Shapes Background -->
<div class="brand-bg">
  <div class="shape teal"></div>
  <div class="shape yellow"></div>
  <div class="shape dark"></div>
</div>

<!-- Main -->
<div class="wrapper">

  <!-- Branding -->
  <div class="brand">
    <h1>المتحدة الطبية التخصصية</h1>
    <p>نظام إدارة العيادات</p>
  </div>

  <!-- Glass Login -->
  <div class="glass-card">

    <h2>تسجيل الدخول</h2>

    <form>
      <div class="input">
        <input type="text" required>
        <label>اسم المستخدم</label>
      </div>

      <div class="input">
        <input type="password" required>
        <label>كلمة المرور</label>
      </div>

      <button>دخول</button>
    </form>

  </div>

</div>

</body>
</html>
